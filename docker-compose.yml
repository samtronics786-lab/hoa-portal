version: '3.9'
services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: hoa_password
      POSTGRES_DB: hoa_portal.
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
      - BCRYPT_SALT_ROUNDS=${BCRYPT_SALT_ROUNDS}
      - CLIENT_APP_URL=http://localhost:3000
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=hoa_password
      - PGDATABASE=hoa_portal
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - SESSION_IDLE_TIMEOUT_MINUTES=${SESSION_IDLE_TIMEOUT_MINUTES:-30}
      - SESSION_MAX_AGE_DAYS=${SESSION_MAX_AGE_DAYS:-7}
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    volumes:
      - uploads-data:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=/api
      - VITE_API_BASE_URL=/api
    depends_on:
      - server

volumes:
  postgres-data:
  uploads-data:
